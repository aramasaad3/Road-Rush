name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ──────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl wget \
            openjdk-17-jdk \
            python3-pip \
            build-essential \
            libssl-dev \
            libffi-dev \
            libltdl-dev \
            libgdbm-dev \
            libbz2-dev \
            zlib1g-dev \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libncurses5-dev \
            ccache \
            lld \
            autoconf \
            automake

      # ── 4. Install Buildozer & Cython ───────────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37

      # ── 5. Accept Android SDK licenses (no interactive prompt) ──────────────
      - name: Accept Android SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > $ANDROID_HOME/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > $ANDROID_HOME/licenses/android-sdk-preview-license

      # ── 6. Cache the Buildozer global directory ──────────────────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 7. Build the APK (debug) ─────────────────────────────────────────────
      - name: Build APK
        env:
          # Suppress any interactive prompts from python-for-android / SDK tools
          DEBIAN_FRONTEND: noninteractive
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          buildozer android debug 2>&1 | tee build.log
          ls -la bin/ || echo "bin/ directory not found — check build.log"

      # ── 8. Upload the APK as a downloadable artifact ────────────────────────
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RoadRush-APK
          path: bin/*.apk
          retention-days: 30

      # ── 9. Always upload build log for debugging ─────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
